<!DOCTYPE html>
<html>

<head>

<title>VoxelForge Generator</title>

<style>

* {
box-sizing:border-box;
}


body {

margin:0;

background:#080b12;

color:white;

font-family:Arial, Helvetica, sans-serif;

}


/* NAVIGATION */

nav {

height:70px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 60px;

border-bottom:1px solid #162235;

}


.logo {

font-size:32px;

font-weight:900;

letter-spacing:4px;

background:linear-gradient(
90deg,
white,
#1683ff
);

-webkit-background-clip:text;

color:transparent;

}



nav button {

background:none;

border:none;

color:#9aa4b5;

margin-left:20px;

cursor:pointer;

}



/* MAIN */

.container {

padding:50px;

text-align:center;

}


h1 {

font-size:45px;

margin-bottom:10px;

}


.subtitle {

color:#9aa4b5;

font-size:18px;

}



/* BUTTONS */

button {

font-family:inherit;

}



.categories button,
.mode-buttons button,
.generate-button,
.export-button {

padding:12px 25px;

margin:8px;

border-radius:10px;

border:1px solid #1683ff;

background:#101621;

color:white;

cursor:pointer;

transition:.2s;

}



.categories button:hover,
.mode-buttons button.active,
.generate-button:hover,
.export-button:hover {

background:#1683ff;

box-shadow:
0 0 25px #1683ff;

}



/* SEARCH */

#search {

width:400px;

padding:15px;

margin-top:25px;

background:#101621;

border:1px solid #1683ff;

border-radius:10px;

color:white;

font-size:16px;

}



/* OBJECT CARDS */


.items {

display:flex;

justify-content:center;

gap:25px;

margin-top:40px;

flex-wrap:wrap;

}



.card {

width:220px;

height:220px;

background:#101621;

border-radius:15px;

border:1px solid #1683ff;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

cursor:pointer;

transition:.25s;

}



.card:hover {

transform:translateY(-5px);

box-shadow:
0 0 25px #1683ff;

}



.card.selected {

background:#162235;

border:2px solid #1683ff;

box-shadow:
0 0 30px #1683ff;

}



.icon {

font-size:60px;

}



.card-info {

color:#9aa4b5;

font-size:14px;

}



/* PANELS */


.workspace {

display:flex;

justify-content:center;

gap:40px;

flex-wrap:wrap;

margin-top:50px;

}



.panel {

width:420px;

background:#101621;

border:1px solid #1683ff;

border-radius:15px;

padding:25px;

box-shadow:
0 0 15px rgba(22,131,255,.3);

}



.panel h2 {

margin-top:0;

}



/* PREVIEW */


.preview {

height:300px;

background:#080b12;

border:1px solid #162235;

border-radius:12px;

display:flex;

align-items:center;

justify-content:center;

font-size:80px;

}



/* SETTINGS */


.setting-row {

display:flex;

justify-content:center;

align-items:center;

gap:10px;

margin:15px;

}


.setting-row input,
select {

width:80px;

padding:10px;

background:#080b12;

border:1px solid #1683ff;

border-radius:8px;

color:white;

}


</style>

</head>



<body>



<nav>


<div class="logo">

VOXELFORGE

</div>



<div>

<a href="index.html">
<button>
Home
</button>
</a>


<a href="image.html">
<button>
Image
</button>
</a>


<a href="about.html">
<button>
About
</button>
</a>

</div>


</nav>





<div class="container">


<h1>
Minecraft Generator
</h1>


<p class="subtitle">
Create Minecraft structures from blocks, mobs and entities.
</p>




<div class="categories">


<button onclick="changeType('block')">
🧱 Blocks
</button>


<button onclick="changeType('mob')">
👾 Mobs
</button>


<button onclick="changeType('entity')">
📦 Entities
</button>


<button onclick="changeType('all')">
🌎 All
</button>


</div>




<input
id="search"
placeholder="Search Minecraft..."
onkeyup="loadItems()">





<div class="items" id="items">


</div>
<div class="workspace">


<div class="panel" id="selected-panel">


<h2>
No Selection
</h2>


<p>
Choose a Minecraft object.
</p>


</div>





<div class="panel">


<h2>
Generation Settings
</h2>



<p id="size-title">
Resolution
</p>



<div class="setting-row">


<label>
X
</label>


<input 
id="size-x"
type="number"
value="16">



<label>
Y
</label>


<input 
id="size-y"
type="number"
value="16">



<label>
Z
</label>


<input 
id="size-z"
type="number"
value="16">



</div>




<p id="size-info">
Minecraft block resolution
</p>




<p>
Scale
</p>



<select id="scale">


<option value="1">
Original
</option>


<option value="2">
2x
</option>


<option value="4">
4x
</option>


<option value="8">
8x
</option>


</select>





<p>
Generation Mode
</p>



<div class="mode-buttons">


<button onclick="setMode('structure')">

🧱 Structure

</button>



<button onclick="setMode('blueprint')">

📘 Blueprint

</button>



<button onclick="setMode('image')">

🖼 Image

</button>


</div>





<button class="generate-button" onclick="generateStructure()">

Generate

</button>



<button class="export-button" onclick="exportStructure()">

Export NBT

</button>



</div>





<div class="panel">


<h2>
Preview
</h2>


<div class="preview" id="preview">


⬜


</div>


<p id="generation-status">

Waiting for generation...

</p>


</div>



</div>



</div>



<script src="minecraft-data.js"></script>

<script src="js/colour-matcher.js"></script>

<script src="js/texture-loader.js"></script>

<script src="js/voxel-engine.js"></script>

<script src="js/nbt-exporter.js"></script>

<script src="js/generator.js"></script>


<script>

document
.querySelector(".generate-button")
.addEventListener(
"click",
function(){

    generateStructure();

});

</script>



</body>

</html>
