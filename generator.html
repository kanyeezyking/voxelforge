<!DOCTYPE html>
<html>

<head>

<title>VoxelForge Generator</title>

<style>

* {
box-sizing:border-box;
}


body {

margin:0;

background:#080b12;

color:white;

font-family:Arial, Helvetica, sans-serif;

}


/* NAVIGATION */

nav {

height:70px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 60px;

border-bottom:1px solid #162235;

}


.logo {

font-size:32px;

font-weight:900;

letter-spacing:4px;

background:linear-gradient(
90deg,
white,
#1683ff
);

-webkit-background-clip:text;

color:transparent;

}


nav button {

background:none;

border:none;

color:#9aa4b5;

margin-left:20px;

cursor:pointer;

}



/* MAIN */

.container {

padding:50px;

text-align:center;

}


h1 {

font-size:45px;

margin-bottom:10px;

}



/* BUTTONS */

button {

font-family:inherit;

}



.categories button,
.mode-buttons button {

padding:12px 25px;

margin:8px;

border-radius:10px;

border:1px solid #1683ff;

background:#101621;

color:white;

cursor:pointer;

transition:.2s;

}



.categories button:hover,
.mode-buttons button:hover {

background:#1683ff;

box-shadow:0 0 20px #1683ff;

}



/* SEARCH */

#search {

width:400px;

padding:15px;

margin-top:25px;

background:#101621;

border:1px solid #1683ff;

border-radius:10px;

color:white;

font-size:16px;

}



/* OBJECT CARDS */


.items {

display:flex;

justify-content:center;

gap:25px;

margin-top:40px;

flex-wrap:wrap;

}



.card {

width:220px;

height:220px;

background:#101621;

border-radius:15px;

border:1px solid #1683ff;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

cursor:pointer;

transition:.25s;

box-shadow:
0 0 12px rgba(22,131,255,.3);

}



.card:hover {

transform:translateY(-5px);

box-shadow:
0 0 25px #1683ff;

}



.card.selected {

background:#162235;

border:2px solid #1683ff;

box-shadow:
0 0 30px #1683ff;

}



.placeholder {

font-size:60px;

}



.card-info {

color:#9aa4b5;

font-size:14px;

}



/* PANELS */


.panel {

width:420px;

margin:40px auto;

background:#101621;

border:1px solid #1683ff;

border-radius:15px;

padding:25px;

box-shadow:
0 0 15px rgba(22,131,255,.3);

}



.panel h2 {

margin-top:0;

}



/* SETTINGS */


.setting-row {

display:flex;

justify-content:center;

align-items:center;

gap:10px;

margin:15px;

}


.setting-row input {

width:70px;

padding:10px;

background:#080b12;

border:1px solid #1683ff;

border-radius:8px;

color:white;

text-align:center;

}


select {

background:#080b12;

color:white;

border:1px solid #1683ff;

border-radius:8px;

padding:10px;

}



.generate-button {

margin-top:20px;

padding:14px 35px;

border-radius:12px;

border:1px solid #1683ff;

background:#080b12;

color:white;

cursor:pointer;

font-size:16px;

}



.generate-button:hover {

background:#1683ff;

box-shadow:
0 0 25px #1683ff;

}



.hidden {

display:none;

}


</style>

</head>


<body>


<nav>

<div class="logo">
VOXELFORGE
</div>


<div>

<button>Home</button>
<button>Image</button>
<button>About</button>

</div>

</nav>



<div class="container">


<h1>
Minecraft Generator
</h1>


<p>
Create Minecraft structures from blocks, mobs and entities.
</p>



<div class="categories">


<button onclick="changeType('block')">
🧱 Blocks
</button>


<button onclick="changeType('mob')">
👾 Mobs
</button>


<button onclick="changeType('entity')">
📦 Entities
</button>


<button onclick="changeType('all')">
🌎 All
</button>


</div>



<input
id="search"
placeholder="Search Minecraft..."
onkeyup="loadItems()">



<div class="items" id="items">

</div>



<div class="panel" id="selected-panel">

<h2>
No Selection
</h2>


<p>
Choose a Minecraft object.
</p>


</div>



<div class="panel">


<h2>
Generation Settings
</h2>


<p id="size-title">
Resolution
</p>


<div class="setting-row">


<label>X</label>

<input id="size-x" type="number" value="16">


<label>Y</label>

<input id="size-y" type="number" value="16">


<label>Z</label>

<input id="size-z" type="number" value="16">


</div>


<p id="size-info">
Minecraft texture resolution
</p>



<p>
Scale
</p>


<select id="scale">

<option value="1">
Original
</option>


<option value="2">
2x
</option>


<option value="4">
4x
</option>


<option value="8">
8x
</option>

</select>



<p>
Generation Mode
</p>



<div class="mode-buttons">


<button onclick="setMode('structure')">
🧱 Structure
</button>


<button onclick="setMode('blueprint')">
📘 Blueprint
</button>


</div>



<button class="generate-button">
Generate
</button>


</div>


</div>
<script src="minecraft-data.js"></script>

<script>


let currentType = "block";

let currentMode = "structure";

let selectedItem = null;



function loadItems(){


let container = document.getElementById("items");


container.innerHTML = "";



let search = document
.getElementById("search")
.value
.toLowerCase();



let data = [];



if(currentType === "block"){

data = minecraftBlocks;

}


if(currentType === "mob"){

data = minecraftMobs;

}


if(currentType === "entity"){

data = minecraftEntities;

}


if(currentType === "all"){

data = [
...minecraftBlocks,
...minecraftMobs,
...minecraftEntities
];

}



data = data.filter(item => {


return item.name
.toLowerCase()
.includes(search);


});



data.forEach(item => {


container.innerHTML += `

<div class="card"
onclick="selectItem('${item.name}', this)">


<div class="placeholder">

${item.icon}

</div>


<h3>

${item.name}

</h3>


<div class="card-info">

${item.type}

</div>


</div>

`;

});


}





function changeType(type){


currentType = type;


loadItems();


}




function selectItem(name, element){


document.querySelectorAll(".card")
.forEach(card=>{

card.classList.remove("selected");

});


element.classList.add("selected");



let allItems = [

...minecraftBlocks,

...minecraftMobs,

...minecraftEntities

];



selectedItem = allItems.find(
item => item.name === name
);



updateSettings();



let panel = document.getElementById(
"selected-panel"
);



panel.innerHTML = `


<h2>

${selectedItem.icon}

${selectedItem.name}

</h2>



<p>

Type:

${selectedItem.type}

</p>



<p>

Category:

${selectedItem.category}

</p>



<p>

Dimensions:

${selectedItem.size.x}
×

${selectedItem.size.y}
×

${selectedItem.size.z}

</p>



`;



}




function updateSettings(){


if(!selectedItem){

return;

}



let x = document.getElementById("size-x");

let y = document.getElementById("size-y");

let z = document.getElementById("size-z");



let title = document.getElementById("size-title");

let info = document.getElementById("size-info");





if(selectedItem.type === "block"){


title.innerHTML =
"Block Resolution";


info.innerHTML =
"Blocks scale evenly in all directions";



x.value = 16;
y.value = 16;
z.value = 16;



[x,y,z].forEach(input=>{


input.onchange = function(){


let value = Number(this.value);



if(value < 16){

value = 16;

}



value = Math.round(value / 16) * 16;



x.value = value;

y.value = value;

z.value = value;



};



});


}



else {



title.innerHTML =
"Model Resolution";



info.innerHTML =
"Entity dimensions scale proportionally";



x.value = selectedItem.size.x;

y.value = selectedItem.size.y;

z.value = selectedItem.size.z;



}



}





function setMode(mode){


currentMode = mode;



console.log(
"Generation mode:",
currentMode
);



}





document
.getElementById("scale")
.addEventListener(
"change",
function(){


if(!selectedItem){

return;

}



let multiplier = Number(this.value);



document.getElementById("size-x").value =
selectedItem.size.x * multiplier;



document.getElementById("size-y").value =
selectedItem.size.y * multiplier;



document.getElementById("size-z").value =
selectedItem.size.z * multiplier;



}
);





loadItems();



</script>


</body>

</html>
