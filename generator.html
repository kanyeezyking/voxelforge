<!DOCTYPE html>
<html>

<head>

<title>VoxelForge Generator</title>


<style>
.selected-panel {

margin:50px auto;

width:350px;

background:#101621;

border:1px solid #1683ff;

border-radius:15px;

padding:25px;

box-shadow:
0 0 15px rgba(22,131,255,.3);

}


.selected-panel h2 {

margin-top:0;

}


.generate-button {

margin-top:20px;

padding:14px 30px;

border-radius:12px;

border:1px solid #1683ff;

background:#080b12;

color:white;

cursor:pointer;

font-size:16px;

}


.generate-button:hover {

background:#1683ff;

box-shadow:
0 0 20px #1683ff;

}
body {

margin:0;

background:#080b12;

color:white;

font-family:Arial, Helvetica, sans-serif;

}


/* Navigation */

nav {

height:70px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 60px;

border-bottom:1px solid #162235;

}


.logo {

font-size:32px;

font-weight:900;

letter-spacing:4px;

background:linear-gradient(
90deg,
white,
#1683ff
);

-webkit-background-clip:text;

color:transparent;

}


nav button {

background:none;

border:none;

color:#aaa;

margin-left:20px;

cursor:pointer;

}


/* Main */

.container {

padding:50px;

text-align:center;

}



h1 {

font-size:45px;

}



/* Category buttons */


.categories button {


padding:12px 25px;

margin:10px;

border-radius:10px;

border:1px solid #1683ff;

background:#101621;

color:white;

cursor:pointer;

}


.categories button:hover {

background:#1683ff;

box-shadow:
0 0 20px #1683ff;

}



/* Search */


input {

width:400px;

padding:15px;

margin-top:30px;

background:#101621;

border:1px solid #1683ff;

border-radius:10px;

color:white;

font-size:16px;

}


/* Cards */


.items {

display:flex;

justify-content:center;

gap:25px;

margin-top:50px;

flex-wrap:wrap;

}


.card {

width:220px;

height:220px;

background:#101621;

border-radius:15px;

border:1px solid #1683ff;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

box-shadow:
0 0 12px rgba(22,131,255,.3);

}


.placeholder {

font-size:60px;

}

.card {

cursor:pointer;

transition:.25s;

}


.card:hover {

transform:translateY(-5px);

box-shadow:
0 0 25px rgba(22,131,255,.7);

}


.card.selected {

background:#162235;

border:2px solid #1683ff;

box-shadow:
0 0 30px #1683ff;

}



.card-info {

font-size:13px;

color:#9aa4b5;

margin-top:5px;

}



.settings {

margin:40px auto;

width:400px;

background:#101621;

border:1px solid #1683ff;

border-radius:15px;

padding:25px;

}



.settings input {

width:80px;

margin:10px;

}



.settings button {

margin-top:20px;

}
</style>

</head>



<body>



<nav>


<div class="logo">
VOXELFORGE
</div>


<div>

<button>
Home
</button>

<button>
Image
</button>

<button>
About
</button>


</div>


</nav>




<div class="container">


<h1>
Minecraft Generator
</h1>


<p>
Choose a Minecraft block, mob or entity.
</p>



<div class="categories">


<button onclick="changeType('block')">
🧱 Blocks
</button>


<button onclick="changeType('mob')">
👾 Mobs
</button>


<button onclick="changeType('entity')">
📦 Entities
</button>

<button onclick="changeType('all')">

🌎 All

</button>
  
</div>




<input 
id="search"
placeholder="Search Minecraft..."
onkeyup="loadItems()">




<div class="items" id="items">

</div>


<div class="selected-panel" id="selected-panel">

<h2>
No Selection
</h2>

<p>
Choose a Minecraft object.
</p>

</div>
<div class="settings">

<h2>
Generation Settings
</h2>


<p>
Structure Size
</p>


<input value="10">
x
<input value="10">
x
<input value="10">


<br>


<button class="generate-button">

Generate

</button>


</div>


</div>
<script src="minecraft-data.js"></script>


<script>


let currentType = "block";

let searchText = "";



function loadItems(){


let container = document.getElementById("items");


container.innerHTML = "";



searchText = document
.getElementById("search")
.value
.toLowerCase();



let data;



if(currentType === "block"){

data = minecraftBlocks;

}



if(currentType === "mob"){

data = minecraftMobs;

}



if(currentType === "entity"){

data = minecraftEntities;

}

if(currentType === "all"){

data = [
...minecraftBlocks,
...minecraftMobs,
...minecraftEntities
];

}



data = data.filter(item => {


return item.name
.toLowerCase()
.includes(searchText);


});




data.forEach(item => {


container.innerHTML += `

<div class="card"
onclick="selectItem('${item.name}', this)">


<div class="placeholder">

${item.icon}

</div>


<h3>

${item.name}

</h3>


<div class="card-info">

${item.type}

</div>


</div>

`;

});


}





function changeType(type){


currentType = type;


loadItems();


}



function selectItem(name, element){


document.querySelectorAll(".card")
.forEach(card => {

card.classList.remove("selected");

});


element.classList.add("selected");



let allItems = [

...minecraftBlocks,

...minecraftMobs,

...minecraftEntities

];


let item = allItems.find(
x => x.name === name
);



let panel = document.getElementById(
"selected-panel"
);



panel.innerHTML = `


<h2>

${item.icon}

${item.name}

</h2>


<p>

Type:

${item.type}

</p>


<p>

Category:

${item.category || "Unknown"}

</p>


<button class="generate-button">

Generate Structure

</button>


`;

}
loadItems();



</script>



</body>

</html>
