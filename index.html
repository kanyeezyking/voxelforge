<!DOCTYPE html>
<html>
<head>
<title>Voxel Forge</title>

<style>
body {
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:Arial;
}

header {
    padding:40px;
    text-align:center;
}

button {
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#4caf50;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.card {
    background:#2b2b2b;
    padding:30px;
    margin:20px auto;
    width:400px;
    border-radius:15px;
}

</style>

</head>

<body>

<header>

<h1>Voxel Forge</h1>

<p>
Minecraft Structure Generator
</p>

</header>


<div class="card">

<h2>🧱 Minecraft Generator</h2>

<p>
Create giant Minecraft structures from blocks, mobs and entities.
</p>

<button>
Start Generator
</button>

</div>



<div class="card">

<h2>🖼 Image Generator</h2>

<p>
Turn images into Minecraft builds.
</p>

<button>
Upload Image
</button>

</div>


</body>
</html>
